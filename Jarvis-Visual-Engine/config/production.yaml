# Production Configuration

application:
  name: "Vision Engine"
  version: "1.0.0"
  debug: false
  log_level: "INFO"

processing:
  frame_rate: 30
  resolution_strategy:
    face_recognition: "1080p"
    scene_analysis: "720p"
    motion_detection: "480p"
  motion_threshold: 5.0
  face_confidence_threshold: 0.6
  smart_triggering: true
  smart_triggering_cooldown: 5  # seconds

vision_api:
  primary: "gpt4o"
  fallback: "claude"
  detail_level: "high"
  max_retries: 3
  timeout: 30  # seconds

cache:
  ttl: 3600  # 1 hour
  max_size: 10000
  enabled: true

privacy:
  data_retention_days: 30
  audit_retention_days: 365
  encryption_enabled: true
  privacy_mode_default: false

intelligence:
  pattern_learning_enabled: true
  context_awareness_enabled: true
  predictive_analysis_enabled: true
  anomaly_detection_enabled: true

features:
  spatial_memory: true
  appearance_tracking: true
  screen_assistance: true
  visual_guidance: true
  face_recognition: true

security:
  api_key_required: true
  cors_origins: []  # Set in environment
  rate_limiting_enabled: true

monitoring:
  metrics_enabled: true
  health_check_interval: 30  # seconds

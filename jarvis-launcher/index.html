<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS Launcher</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .container {
      width: 600px;
      height: 400px;
      background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
      border: 2px solid #ff0000;
      border-radius: 20px;
      box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .title-bar {
      height: 40px;
      background: linear-gradient(to bottom, #2a0000, #000000);
      border-bottom: 1px solid #ff0000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      -webkit-app-region: drag;
    }

    .title {
      color: #ff0000;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
    }

    .window-controls {
      display: flex;
      gap: 10px;
      -webkit-app-region: no-drag;
    }

    .window-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
    }

    .minimize-btn {
      background: #ffaa00;
    }

    .close-btn {
      background: #ff0000;
    }

    .window-btn:hover {
      transform: scale(1.2);
      box-shadow: 0 0 10px currentColor;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 30px;
    }

    .logo {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, #ff0000 0%, #990000 50%, transparent 70%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s infinite;
      position: relative;
    }

    .logo::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid #ff0000;
      border-radius: 50%;
      animation: ripple 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
      50% { box-shadow: 0 0 40px rgba(255, 0, 0, 0.8); }
    }

    @keyframes ripple {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    .logo-text {
      color: #ff0000;
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 5px;
      text-shadow: 0 0 20px rgba(255, 0, 0, 1);
      font-family: 'Courier New', monospace;
    }

    .subtitle {
      color: #ff0000;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.8;
      margin-top: -20px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 400px;
      -webkit-app-region: no-drag;
    }

    .launch-btn {
      background: linear-gradient(135deg, #ff0000 0%, #990000 100%);
      color: white;
      border: 2px solid #ff0000;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .launch-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .launch-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .launch-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 0, 0, 0.5);
    }

    .launch-btn:active {
      transform: translateY(0);
      box-shadow: 0 3px 10px rgba(255, 0, 0, 0.3);
    }

    .launch-btn span {
      position: relative;
      z-index: 1;
    }

    .secondary-btn {
      background: linear-gradient(135deg, #550000 0%, #220000 100%);
    }

    .scanner {
      width: 100%;
      height: 4px;
      background: #1a0000;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 20px;
    }

    .scanner-bar {
      width: 30%;
      height: 100%;
      background: linear-gradient(to right, transparent, #ff0000, transparent);
      animation: scan 2s infinite;
    }

    @keyframes scan {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .status {
      color: #ff0000;
      font-size: 12px;
      opacity: 0.6;
      margin-top: 10px;
      text-align: center;
      letter-spacing: 1px;
    }

    .launching {
      animation: blink 0.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-bar">
      <div class="title">KNIGHT INDUSTRIES AI SYSTEM</div>
      <div class="window-controls">
        <div class="window-btn minimize-btn" onclick="minimizeWindow()"></div>
        <div class="window-btn close-btn" onclick="closeWindow()"></div>
      </div>
    </div>

    <div class="content">
      <div class="logo">
        <div class="logo-text">J.A.R.V.I.S</div>
      </div>

      <div class="subtitle">Just A Rather Very Intelligent System</div>

      <div class="buttons">
        <button class="launch-btn" onclick="launchFull()">
          <span>🚀 Launch Complete System</span>
        </button>
        <button class="launch-btn secondary-btn" onclick="launchDesktop()">
          <span>💻 Launch Desktop Only</span>
        </button>
        <button class="launch-btn secondary-btn" onclick="launchBackend()">
          <span>⚙️ Launch Backend Only</span>
        </button>
      </div>

      <div class="scanner">
        <div class="scanner-bar"></div>
      </div>

      <div class="status" id="status">READY FOR DEPLOYMENT</div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    function setStatus(text, launching = false) {
      const status = document.getElementById('status');
      status.textContent = text;
      if (launching) {
        status.classList.add('launching');
      } else {
        status.classList.remove('launching');
      }
    }

    function launchFull() {
      setStatus('LAUNCHING COMPLETE SYSTEM...', true);
      ipcRenderer.send('launch-both');
    }

    function launchDesktop() {
      setStatus('LAUNCHING DESKTOP APP...', true);
      ipcRenderer.send('launch-jarvis');
    }

    function launchBackend() {
      setStatus('LAUNCHING BACKEND SERVER...', true);
      ipcRenderer.send('launch-backend');
    }

    function closeWindow() {
      ipcRenderer.send('close-app');
    }

    function minimizeWindow() {
      ipcRenderer.send('minimize-app');
    }

    // Add keyboard shortcut
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        launchFull();
      }
      if (e.key === 'Escape') {
        closeWindow();
      }
    });

    // Auto-launch on spacebar
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        launchFull();
      }
    });
  </script>
</body>
</html>
